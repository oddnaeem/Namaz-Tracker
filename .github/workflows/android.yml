name: Java CI with Gradle

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # গ্র্যাডল সেটআপ এবং ক্যাশ ম্যানেজমেন্ট (wrapper jar ছাড়াই কাজ করবে)
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.5' # আপনার প্রোজেক্টের প্রয়োজনীয় ভার্সনটি এখানে দিন

    # এখানে './gradlew' এর বদলে সরাসরি 'gradle' ব্যবহার করা হয়েছে
    - name: Build with Gradle
      run: gradle build
